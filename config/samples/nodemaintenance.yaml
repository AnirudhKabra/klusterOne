apiVersion: ko.io/v1alpha1
kind: NodeMaintenance
metadata:
  name: example-script
  annotations:
    ko.io/runner-namespace: ko-system
spec:
  paused: false
  allNodes: true
  script:
    configMapRef:
      name: nm-example-script-script
    image: alpine:3.19
    timeoutSeconds: 600
    runOnHost: true
    env:
      - name: GREETING
        value: hello-world
  strategy:
    maxUnavailable: 2
  actions:
    - type: Cordon
    - type: Script
    - type: Uncordon
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nm-example-script-script
  namespace: ko-system
data:
  script.sh: |
    #!/bin/sh
    set -eu
    echo "$GREETING from $NODE_NAME at $(date -u +%FT%TZ)"
    uname -a
