# Top-level kustomization. Order is the natural dependency order:
#   1. manager    — creates the ko-system Namespace and the controller Deployment
#   2. crd        — installs the NodeMaintenance CRD
#   3. rbac       — ServiceAccount + (Cluster)Role + (Cluster)RoleBinding
#   4. admission  — ValidatingAdmissionPolicy locking down all ConfigMap
#                   CREATE/UPDATE/DELETE in ko-system to the controller SA
#                   (plus root-ca-cert-publisher for kube-root-ca.crt). See
#                   docs/security.md. Requires Kubernetes 1.30+; remove this
#                   entry on older clusters and rely on tight ko-system RBAC.
#
# Override the controller image at deploy time:
#
#   cd config && kustomize edit set image ko-controller=ghcr.io/kluster-one/ko-controller:v0.1.0
#
# or just: `make deploy IMAGE=ghcr.io/kluster-one/ko-controller:v0.1.0`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- manager
- crd
- rbac
- admission

images:
- name: ko-controller
  newName: ko-controller
  newTag: dev
